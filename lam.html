<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <title><%- title %></title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta
            content="Xiaxiaobai's personal website, a simple and secure anonymous message board that lets users send and receive anonymous messages. Perfect for honest feedback and fun interactions."
            name="description">
        <link rel="icon" href="/assets/favicon.ico">
        <link rel="preload" href="/assets/MapleMono-Light.woff2" as="font" type="font/woff2" crossorigin>
        <style>
            @font-face {
                font-family: "MapleMono";
                font-display: swap;
                src: url("/assets/MapleMono-Light.woff2");
            }
            html, body {
                height: auto;
                scrollbar-width: none;
                margin: 0;
                width: 100%;
                color: rgb(89,89,89);
            }

            body::-webkit-scrollbar {
                display: none;
            }

            .flowbox {
                margin: 2rem;
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
            }

            html {
                margin: 0;
                font-family: 'MapleMono', monospace;
            }

            .flowblock {
                flex: auto;
                max-width: 100%;
                opacity: 0;
                animation: flowblockanim 450ms ease-out both;
                content-visibility: auto;
                background-color: rgba(255, 255, 255, 0.8);
                padding: 1rem;
                box-shadow: 0 0.5em 1em -0.125em hsla(221deg, 14%, 4%,0.1),0 0px 0 1px hsla(221deg, 14%, 4%,0.02);
            }

            @keyframes flowblockanim {
                from {
                    opacity: 0;
                    transform: translateY(500px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .card-header {
                display: flex;
                box-shadow: 0 0.125em 0.25em hsla(221, 14%, 4%,0.1);
            }

            .input-text {
                border: unset;
                border-bottom: 1px solid #000;
                width: 20rem;
                max-width: 60%;
                margin-right: 2rem;
            }
            
            .input-text:focus {
                outline: unset;
                border-bottom: 1px solid #000;
            }

        </style>
        
        <script>
            let body = document.documentElement;
            function setCookie(cname,cvalue,exdays)
            {
                var d = new Date();
                d.setTime(d.getTime()+(exdays*24*60*60*1000));
                var expires = "expires="+d.toGMTString();
                document.cookie = cname + "=" + cvalue + "; " + expires;
            }
            document.addEventListener('alpine:init', () => {
                Alpine.store('myStore', {
                    flows: <%- flows %>,
                    submit_text: async function(a) {
                        if (a.key === 'Enter') {
                            if (a.target.value.trim() == "") {
                                alert('发点什么吧。。。');
                                return;
                            }
                            author = document.getElementById('author').value || '匿名用户';
                            let res = await fetch('/api/postflow?text=' + encodeURIComponent(a.target.value.trim()) + '&author=' + encodeURIComponent(author));
                            if (res.status === 200) {
                                setCookie("username", author, 365);
                                alert('发推了。。。');
                                location.reload(); 
                            }
                        }
                    },
                    click_text: async function() {
                        let input = document.getElementById('posttext').value;
                        if (input.trim() == "") {
                            alert('发点什么吧。。。');
                            return;
                        }
                        let author = document.getElementById('author').value || '匿名用户';
                        let res = await fetch('/api/postflow?text=' + encodeURIComponent(input.trim()) + '&author=' + encodeURIComponent(author));
                        if (res.status === 200) {
                            setCookie("username", author, 365);
                            alert('发推了。。。');
                            location.reload();
                        }
                    }
                });
                document.getElementById('main').addEventListener('click', async (e) => {
                    if (e.target.matches('.love-button')) {
                        const id = e.target.dataset.flowId;
                        let res = await fetch('/api/loveflow?id=' + encodeURIComponent(id));
                        if (res.status === 200) {
                            const a = document.getElementById(id);
                            a.textContent = parseInt(a.textContent) + 1;
                        }
                    }
                });
                const store = Alpine.store('myStore');
                var offset = store.flows.length;

                let nomore = false;
                let lock = false;
                window.addEventListener('scroll', async () => {
                    if (!lock && !nomore && body.scrollTop + body.clientHeight >= body.scrollHeight-100) {
                        lock = true;
                        let flows = await (await fetch('/api/getflows?offset=' + offset)).json();
                        if (flows.length == 0) { nomore = true; return }
                        offset += flows.length;
                        store.flows.push.apply(store.flows, flows);
                        lock = false;
                    }
                }, { passive: true });
            });
        </script>
    </head>

    <body x-data>
        <header role="banner" style="margin-left: 2rem; margin-top: 1.5rem;line-height: 1.25rem;">
            发推: <input id="author" placeholder="你是?" style="width: 5rem;min-width: 0" class="input-text">
            <input id="posttext" placeholder="发什么....." @keyup="$store.myStore.submit_text(event)" class="input-text">
            <button @click="$store.myStore.click_text()">发推</button>
        </header>
        <main role="main" id="main" class="flowbox">
            <template x-for="(flow, index) in $store.myStore.flows" :key="index">
                <article class="flowblock" :style="`animation-delay: ${(index % 20) * 300}ms`">
                    <header class="card-header">
                        <p style="width: 100%;margin-left: 1rem;" x-text="flow[1]"></p>
                        <div style="float: right; flex-grow: 1;margin: 0.7rem">#<span x-text="flow[4]"></span></div>
                    </header>
                    <div style="white-space: pre-line;">
                        <div><span x-text="flow[2]" style="user-select: none;" tabindex="-1"></span>:</div>
                        <div style="text-indent: 1.4rem" x-text="flow[0]"></div>
                    </div>
                    <footer>
                        <div style="float: right"><span :id="flow[4]" style="margin-right: 1rem;" x-text="flow[3]"></span><button aria-label="点赞" :data-flow-id="flow[4]" class="love-button">Love</button></div>
                    </footer>
                </article>
            </template>
        </main>
        <script><%- alpine %></script>
        <script>
            let ca = document.cookie.split(';');
            for(var i=0; i<ca.length; i++) 
            {
                var c = ca[i].trim();
                if (c.indexOf("username=")==0) {
                    document.getElementById("author").value = c.substring(9, c.length)
                    break
                };
            }
        </script>
    </body>
</html>
